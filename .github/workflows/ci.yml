name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs for the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# nrwl/nx-set-shas reads the Actions API to find the last successful run,
# which needs `actions: read`. Declared explicitly so the job works even
# when the repo/org default GITHUB_TOKEN permissions are restricted.
permissions:
  contents: read
  actions: read

jobs:
  affected:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so Nx can diff the PR against its base SHA.
          fetch-depth: 0

      # Resolves the correct base/head SHAs for `nx affected` on both
      # push and pull_request events.
      - uses: nrwl/nx-set-shas@v4

      # --- toolchains: one runner builds all three languages ---
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
          enable-cache: true
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - run: pnpm install --frozen-lockfile

      # The core of the "only affected" requirement.
      #
      # `nx affected` walks the project graph and runs targets ONLY for
      # projects touched by this diff -- plus everything downstream of them.
      # Because models-ts / models-go / models-py declare an implicit
      # dependency on `proto`, editing a .proto file marks the models
      # libraries affected, which in turn marks every service and app that
      # consumes them. One command, dependency-aware, all languages.
      - name: Run affected targets
        run: pnpm exec nx affected -t codegen lint test build --parallel=3

      # Optional: surface the cascade in the run logs.
      - name: Print affected projects
        if: always()
        run: pnpm exec nx show projects --affected || true
