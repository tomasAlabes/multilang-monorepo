name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so --changed-since can diff

      # Installs Pants and wires the GitHub Actions cache into Pants's
      # fine-grained named caches (pip downloads, Go SDK, pnpm store, ...).
      - uses: pantsbuild/actions/init-pants@v8
        with:
          gha-cache-key: pants-v0
          named-caches-hash: ${{ hashFiles('3rdparty/python/*.lock', '**/go.sum', 'pnpm-lock.yaml') }}

      # BUILD-file hygiene: fail the build if `tailor` would add or change
      # any BUILD file (i.e. someone added code without a target).
      - name: Verify BUILD files
        run: pants tailor --check update-build-files --check ::

      # Affected-only. `--changed-since` walks the git diff; Pants maps the
      # changed files to targets, and `--changed-dependents=transitive`
      # pulls in everything downstream via the INFERRED graph. Editing a
      # .proto reaches every Go/Python service automatically — there is no
      # implicitDependencies (Nx) and no filters.yaml (native branch).
      - name: Lint / typecheck / test / package affected targets
        env:
          DIFF_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          pants --changed-since="$DIFF_BASE" \
                --changed-dependents=transitive \
                lint check test package
