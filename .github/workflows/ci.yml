name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs for the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# nrwl/nx-set-shas reads the Actions API to find the last successful run,
# which needs `actions: read`. Declared explicitly so the job works even
# when the repo/org default GITHUB_TOKEN permissions are restricted.
permissions:
  contents: read
  actions: read

jobs:
  affected:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so Nx can diff the PR against its base SHA.
          fetch-depth: 0

      # Resolves the correct base/head SHAs for `nx affected` on both
      # push and pull_request events.
      - uses: nrwl/nx-set-shas@v5

      # One runner builds all three languages. mise installs every tool
      # (node, pnpm, go, python, uv, buf) from mise.toml -- the same pins
      # used locally, so CI and dev can't drift on tool versions.
      # mise-action caches the installed tools; the per-language *dependency*
      # caches it does NOT cover are declared explicitly below.
      - uses: jdx/mise-action@v2

      # --- dependency caches ---
      - name: Locate pnpm store
        id: pnpm-store
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-
      - name: Cache Go build and module cache
        uses: actions/cache@v4
        with:
          # No go.sum at the repo root -- this is a go.work workspace, so the
          # module checksums live in each module's subdirectory.
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: go-${{ runner.os }}-
      - name: Cache uv cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('**/uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      # The core of the "only affected" requirement.
      #
      # `nx affected` walks the project graph and runs targets ONLY for
      # projects touched by this diff -- plus everything downstream of them.
      # Because models-ts / models-go / models-py declare an implicit
      # dependency on `proto`, editing a .proto file marks the models
      # libraries affected, which in turn marks every service and app that
      # consumes them. One command, dependency-aware, all languages.
      - name: Run affected targets
        run: pnpm exec nx affected -t codegen lint test build --parallel=3

      # Optional: surface the cascade in the run logs.
      - name: Print affected projects
        if: always()
        run: pnpm exec nx show projects --affected || true
