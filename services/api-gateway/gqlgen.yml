# gqlgen reads the shared GraphQL contract from libs/graphql-schema and
# generates the Go server (executable schema + resolver stubs).
schema:
  - ../../libs/graphql-schema/schema.graphql

exec:
  filename: internal/graph/generated.go
  package: graph

model:
  filename: internal/graph/models_gen.go
  package: graph

resolver:
  layout: follow-schema
  dir: internal/resolvers
  package: resolvers
  filename_template: "{name}.resolvers.go"

# Map the GraphQL DateTime scalar onto Go's time.Time.
models:
  DateTime:
    model: github.com/99designs/gqlgen/graphql.Time
