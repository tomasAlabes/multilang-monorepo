# Root of the uv workspace. Members share one lockfile and resolved
# environment; intra-repo dependencies use { workspace = true } sources.
[tool.uv.workspace]
members = [
  "libs/common-py",
  "libs/models-py",
  "ml/anomaly-detector",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.pytest.ini_options]
testpaths = ["libs", "ml"]
